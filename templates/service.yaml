apiVersion: v1
kind: Service
metadata:
  name: picoclaw-gateway
  namespace: {{ .Values.namespace }}
  labels:
    app: picoclaw
    component: gateway
spec:
  type: {{ .Values.service.type }}
  selector:
    app: picoclaw
    component: gateway
  ports:
    - name: http
      port: {{ .Values.service.port }}
      targetPort: http
      protocol: TCP
